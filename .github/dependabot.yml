# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Monitor npm dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    assignees:
      - "tjorim"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "increase"
    groups:
      # Group Express core dependencies (tightly coupled)
      express:
        patterns:
          - "express"
          - "body-parser"
      # Group MongoDB with Mongoose (database + ODM)
      mongodb:
        patterns:
          - "mongodb"
          - "mongoose"
      # Group ESLint and its plugins (linting tools)
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Etc/UTC"
    assignees:
      - "tjorim"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
